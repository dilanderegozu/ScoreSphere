<body class="font-body-md text-body-md">
    <!-- TopNavBar -->
    <header class="bg-surface-container-low border-b border-outline-variant fixed top-0 w-full z-50">
        <div class="flex justify-between items-center w-full px-gutter max-w-container-max mx-auto h-16">
            <div class="flex items-center gap-8">
                <span class="font-display-lg text-headline-md font-black text-primary uppercase tracking-tighter">ScoreSphere</span>
                <nav class="hidden md:flex items-center gap-6">
                    <a href="#" class="text-on-surface-variant font-medium hover:text-primary transition-colors duration-200 font-label-sm text-label-sm">Ana Sayfa</a>
                    <a href="#" class="text-on-surface-variant font-medium hover:text-primary transition-colors duration-200 font-label-sm text-label-sm">Canlı Skorlar</a>
                    <a href="#" class="text-on-surface-variant font-medium hover:text-primary transition-colors duration-200 font-label-sm text-label-sm">Fikstür</a>
                    <a href="#" class="text-primary font-bold border-b-2 border-primary pb-1 font-label-sm text-label-sm">Puan Durumu</a>
                </nav>
            </div>
            <div class="flex items-center gap-4">
                <div class="hidden md:flex items-center bg-surface-container rounded-full px-4 py-1.5 border border-outline-variant">
                    <span class="material-symbols-outlined text-on-surface-variant text-[20px] mr-2">search</span>
                    <input type="text" placeholder="Takım veya lig ara..." class="bg-transparent border-none focus:ring-0 text-sm w-48 placeholder-on-surface-variant">
                </div>


            </div>
        </div>
    </header>

    <!-- Footer -->
    <footer class="bg-surface-container-lowest border-t border-outline-variant">
        <div class="flex flex-col md:flex-row justify-between items-center w-full py-base px-gutter max-w-container-max mx-auto gap-base">
            <span class="font-display-lg text-headline-md font-black text-on-surface uppercase tracking-tighter">ScoreSphere</span>
            <div class="flex gap-6">
                <a class="text-on-surface-variant font-label-sm text-label-sm hover:text-tertiary transition-colors" href="#">Hakkımızda</a>
                <a class="text-on-surface-variant font-label-sm text-label-sm hover:text-tertiary transition-colors" href="#">İletişim</a>
                <a class="text-on-surface-variant font-label-sm text-label-sm hover:text-tertiary transition-colors" href="#">Kullanım Koşulları</a>

            </div>
            <span class="text-on-surface-variant font-label-sm text-label-sm">© 2024 ScoreSphere. Tüm hakları saklıdır.</span>
        </div>
    </footer>
    <!-- Micro-interaction Script -->
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const rows = document.querySelectorAll('tbody tr');
            rows.forEach((row, index) => {
                row.style.opacity = '0';
                row.style.transform = 'translateY(10px)';
                setTimeout(() => {
                    row.style.transition = 'all 0.4s ease-out';
                    row.style.opacity = '1';
                    row.style.transform = 'translateY(0)';
                }, index * 50);
            });
        });
    </script>
</body>
</html>
